<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIQUIFY — Image Warp Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #222230;
    --accent: #ff3c6e;
    --accent2: #00e5ff;
    --accent3: #ffe500;
    --text: #e8e8f0;
    --muted: #555570;
    --tool-active: #ff3c6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
    z-index: 10;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
    cursor: pointer;
    border: none;
    background: none;
  }
  .back-btn:hover { color: var(--accent); }
  .back-btn svg { width: 16px; height: 16px; }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.15em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #ff1a55; }
  .btn:disabled { opacity: 0.3; cursor: default; }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .left-panel {
    width: 220px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 16px 16px 8px;
    border-bottom: 1px solid var(--border);
  }

  /* TOOLS */
  .tools-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 12px;
  }

  .tool-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 12px 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .tool-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .tool-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,60,110,0.08); }
  .tool-btn svg { width: 22px; height: 22px; }

  /* SLIDERS */
  .slider-group {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .slider-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .slider-name {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .slider-val {
    font-size: 11px;
    color: var(--accent2);
    min-width: 32px;
    text-align: right;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    margin-bottom: 12px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent);
    cursor: pointer;
    border-radius: 0;
  }
  input[type=range]:last-child { margin-bottom: 0; }

  /* ACTIONS */
  .actions {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .upload-area {
    border: 1px dashed var(--border);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin: 12px;
  }
  .upload-area:hover { border-color: var(--accent); }
  .upload-area .upload-icon { font-size: 24px; margin-bottom: 8px; }
  .upload-area p { font-size: 9px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  #fileInput { display: none; }

  /* CANVAS AREA */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,60,110,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,229,255,0.04) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
    overflow: hidden;
  }

  #mainCanvas {
    max-width: 100%;
    max-height: 100%;
    cursor: crosshair;
    image-rendering: pixelated;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: var(--muted);
    text-align: center;
    pointer-events: none;
  }
  .empty-state .big-icon {
    font-size: 64px;
    opacity: 0.3;
  }
  .empty-state h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .empty-state p {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* BRUSH CURSOR */
  #brushCursor {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(255,60,110,0.8);
    pointer-events: none;
    transform: translate(-50%, -50%);
    display: none;
    z-index: 5;
  }

  /* STATUS BAR */
  .statusbar {
    height: 28px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 0 16px;
    flex-shrink: 0;
  }
  .status-item {
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .status-item span { color: var(--accent2); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 20px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
    </svg>
    Späť na portál
  </a>
  <div class="logo">LIQ<span>UI</span>FY</div>
  <div class="header-right">
    <button class="btn" id="undoBtn" disabled onclick="undo()">↩ Undo</button>
    <button class="btn" id="resetBtn" disabled onclick="resetImage()">Reset</button>
    <button class="btn primary" id="exportBtn" disabled onclick="exportImage()">Export PNG</button>
  </div>
</header>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="left-panel">

    <div class="section-label">Upload</div>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📁</div>
      <p>Click to load image</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="loadImage(event)">

    <div class="section-label">Tools</div>
    <div class="tools-grid">
      <button class="tool-btn active" data-tool="warp" onclick="setTool('warp')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 3c0 0-4 4-4 9s4 9 4 9"/>
          <path d="M12 3c0 0 4 4 4 9s-4 9-4 9"/>
          <path d="M3 12c0 0 4-4 9-4s9 4 9 4"/>
        </svg>
        Warp
      </button>
      <button class="tool-btn" data-tool="bloat" onclick="setTool('bloat')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="3" x2="12" y2="7"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
          <line x1="3" y1="12" x2="7" y2="12"/>
          <line x1="17" y1="12" x2="21" y2="12"/>
        </svg>
        Bloat
      </button>
      <button class="tool-btn" data-tool="pinch" onclick="setTool('pinch')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="12" r="2"/>
          <line x1="12" y1="3" x2="12" y2="10"/>
          <line x1="12" y1="14" x2="12" y2="21"/>
          <line x1="3" y1="12" x2="10" y2="12"/>
          <line x1="14" y1="12" x2="21" y2="12"/>
        </svg>
        Pinch
      </button>
      <button class="tool-btn" data-tool="swirl" onclick="setTool('swirl')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 3a9 9 0 1 1-6.36 2.64"/>
          <path d="M12 7a5 5 0 1 1-3.54 1.46"/>
          <path d="M12 11a1 1 0 1 1-.01 0"/>
        </svg>
        Swirl
      </button>
      <button class="tool-btn" data-tool="smear" onclick="setTool('smear')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 17l4-4 4 4 4-4 4 4"/>
          <path d="M3 11l4-4 4 4 4-4 4 4"/>
        </svg>
        Smear
      </button>
      <button class="tool-btn" data-tool="crystallize" onclick="setTool('crystallize')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
          <polygon points="12,7 17,10 17,14 12,17 7,14 7,10"/>
        </svg>
        Scatter
      </button>
    </div>

    <div class="section-label">Brush</div>
    <div class="slider-group">
      <div class="slider-row">
        <span class="slider-name">Size</span>
        <span class="slider-val" id="sizeVal">80</span>
      </div>
      <input type="range" min="10" max="200" value="80" id="brushSize"
        oninput="document.getElementById('sizeVal').textContent=this.value; updateBrushCursor()">

      <div class="slider-row">
        <span class="slider-name">Strength</span>
        <span class="slider-val" id="strengthVal">50</span>
      </div>
      <input type="range" min="1" max="100" value="50" id="brushStrength"
        oninput="document.getElementById('strengthVal').textContent=this.value">
    </div>

    <div class="section-label">Actions</div>
    <div class="actions">
      <button class="btn" onclick="document.getElementById('fileInput').click()">Load New Image</button>
    </div>

  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvasArea">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">🌀</div>
      <h2>Drop Your Image</h2>
      <p>Load an image to start warping</p>
    </div>
    <canvas id="mainCanvas" style="display:none"></canvas>
    <div id="brushCursor"></div>
  </div>
</div>

<div class="statusbar">
  <div class="status-item">Tool: <span id="statusTool">WARP</span></div>
  <div class="status-item">Size: <span id="statusSize">80</span>px</div>
  <div class="status-item">Strength: <span id="statusStrength">50</span>%</div>
  <div class="status-item">Pos: <span id="statusPos">—</span></div>
</div>

<div class="toast" id="toast"></div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const brushCursor = document.getElementById('brushCursor');
const canvasArea = document.getElementById('canvasArea');

let originalImageData = null;
let currentImageData = null;
let undoStack = [];
let currentTool = 'warp';
let isDrawing = false;
let lastX = 0, lastY = 0;

// ─── TOOL SELECTION ───────────────────────────────────────
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-tool="${tool}"]`).classList.add('active');
  document.getElementById('statusTool').textContent = tool.toUpperCase();
}

// ─── LOAD IMAGE ───────────────────────────────────────────
function loadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      // fit canvas to area
      const area = canvasArea.getBoundingClientRect();
      const maxW = area.width - 40;
      const maxH = area.height - 40;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = Math.floor(w);
      canvas.height = Math.floor(h);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      currentImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      undoStack = [];
      document.getElementById('emptyState').style.display = 'none';
      canvas.style.display = 'block';
      document.getElementById('undoBtn').disabled = true;
      document.getElementById('resetBtn').disabled = false;
      document.getElementById('exportBtn').disabled = false;
      showToast('Image loaded — start warping!');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── DRAG & DROP ──────────────────────────────────────────
canvasArea.addEventListener('dragover', e => { e.preventDefault(); canvasArea.style.outline = '2px dashed var(--accent)'; });
canvasArea.addEventListener('dragleave', () => { canvasArea.style.outline = ''; });
canvasArea.addEventListener('drop', e => {
  e.preventDefault();
  canvasArea.style.outline = '';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    loadImage({ target: { files: [file] } });
  }
});

// ─── BRUSH CURSOR ─────────────────────────────────────────
function updateBrushCursor() {
  const size = parseInt(document.getElementById('brushSize').value);
  brushCursor.style.width = size + 'px';
  brushCursor.style.height = size + 'px';
  document.getElementById('statusSize').textContent = size;
}
updateBrushCursor();

document.getElementById('brushStrength').addEventListener('input', function() {
  document.getElementById('statusStrength').textContent = this.value;
});

canvasArea.addEventListener('mousemove', e => {
  const rect = canvasArea.getBoundingClientRect();
  brushCursor.style.left = (e.clientX - rect.left) + 'px';
  brushCursor.style.top = (e.clientY - rect.top) + 'px';
  brushCursor.style.display = 'block';

  const cr = canvas.getBoundingClientRect();
  const cx = Math.round((e.clientX - cr.left) * (canvas.width / cr.width));
  const cy = Math.round((e.clientY - cr.top) * (canvas.height / cr.height));
  document.getElementById('statusPos').textContent = `${cx}, ${cy}`;
});

canvasArea.addEventListener('mouseleave', () => { brushCursor.style.display = 'none'; });

// ─── WARP LOGIC ───────────────────────────────────────────
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener('mousedown', e => {
  if (!currentImageData) return;
  pushUndo();
  isDrawing = true;
  const pos = getCanvasPos(e);
  lastX = pos.x; lastY = pos.y;
  applyWarp(pos.x, pos.y, 0, 0);
});

canvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const pos = getCanvasPos(e);
  const dx = pos.x - lastX;
  const dy = pos.y - lastY;
  applyWarp(pos.x, pos.y, dx, dy);
  lastX = pos.x; lastY = pos.y;
});

canvas.addEventListener('mouseup', () => { isDrawing = false; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!currentImageData) return;
  pushUndo();
  isDrawing = true;
  const pos = getCanvasPos(e.touches[0]);
  lastX = pos.x; lastY = pos.y;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDrawing) return;
  const pos = getCanvasPos(e.touches[0]);
  const dx = pos.x - lastX;
  const dy = pos.y - lastY;
  applyWarp(pos.x, pos.y, dx, dy);
  lastX = pos.x; lastY = pos.y;
}, { passive: false });

canvas.addEventListener('touchend', () => { isDrawing = false; });

function applyWarp(cx, cy, dx, dy) {
  const size = parseInt(document.getElementById('brushSize').value);
  const strength = parseInt(document.getElementById('brushStrength').value) / 100;
  const radius = size / 2;

  const src = currentImageData.data;
  const dst = new Uint8ClampedArray(src);
  const w = canvas.width;
  const h = canvas.height;

  const x0 = Math.max(0, Math.floor(cx - radius));
  const x1 = Math.min(w - 1, Math.ceil(cx + radius));
  const y0 = Math.max(0, Math.floor(cy - radius));
  const y1 = Math.min(h - 1, Math.ceil(cy + radius));

  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      const rx = x - cx;
      const ry = y - cy;
      const dist = Math.sqrt(rx*rx + ry*ry);
      if (dist >= radius) continue;

      // falloff curve
      const t = 1 - dist / radius;
      const falloff = t * t * (3 - 2*t);
      const s = falloff * strength;

      let srcX, srcY;

      if (currentTool === 'warp') {
        srcX = x - dx * s * 1.5;
        srcY = y - dy * s * 1.5;
      } else if (currentTool === 'bloat') {
        const push = s * 15;
        srcX = x - (rx / (dist + 0.001)) * push;
        srcY = y - (ry / (dist + 0.001)) * push;
      } else if (currentTool === 'pinch') {
        const pull = s * 15;
        srcX = x + (rx / (dist + 0.001)) * pull;
        srcY = y + (ry / (dist + 0.001)) * pull;
      } else if (currentTool === 'swirl') {
        const angle = s * 2.5;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        srcX = cx + rx * cos - ry * sin;
        srcY = cy + rx * sin + ry * cos;
      } else if (currentTool === 'smear') {
        const smearAmt = s * 20;
        const angle = Math.atan2(dy, dx);
        srcX = x - Math.cos(angle) * smearAmt;
        srcY = y - Math.sin(angle) * smearAmt;
      } else if (currentTool === 'crystallize') {
        // scatter pixels randomly
        const scatter = s * 20;
        srcX = x + (Math.random() - 0.5) * scatter;
        srcY = y + (Math.random() - 0.5) * scatter;
      } else {
        srcX = x; srcY = y;
      }

      // bilinear sample
      const color = bilinearSample(src, w, h, srcX, srcY);
      const idx = (y * w + x) * 4;
      dst[idx]   = color[0];
      dst[idx+1] = color[1];
      dst[idx+2] = color[2];
      dst[idx+3] = color[3];
    }
  }

  currentImageData = new ImageData(dst, w, h);
  ctx.putImageData(currentImageData, 0, 0);
}

function bilinearSample(data, w, h, x, y) {
  x = Math.max(0, Math.min(w - 1.001, x));
  y = Math.max(0, Math.min(h - 1.001, y));
  const x0 = Math.floor(x), y0 = Math.floor(y);
  const x1 = x0 + 1, y1 = y0 + 1;
  const fx = x - x0, fy = y - y0;
  const result = [0,0,0,0];
  const corners = [[x0,y0,(1-fx)*(1-fy)],[x1,y0,fx*(1-fy)],[x0,y1,(1-fx)*fy],[x1,y1,fx*fy]];
  for (const [cx,cy,w2] of corners) {
    const idx = (Math.min(h-1,cy) * w + Math.min(w-1,cx)) * 4;
    result[0] += data[idx]   * w2;
    result[1] += data[idx+1] * w2;
    result[2] += data[idx+2] * w2;
    result[3] += data[idx+3] * w2;
  }
  return result;
}

// ─── UNDO ─────────────────────────────────────────────────
function pushUndo() {
  undoStack.push(new ImageData(new Uint8ClampedArray(currentImageData.data), currentImageData.width, currentImageData.height));
  if (undoStack.length > 20) undoStack.shift();
  document.getElementById('undoBtn').disabled = false;
}

function undo() {
  if (!undoStack.length) return;
  currentImageData = undoStack.pop();
  ctx.putImageData(currentImageData, 0, 0);
  if (!undoStack.length) document.getElementById('undoBtn').disabled = true;
}

// ─── RESET ────────────────────────────────────────────────
function resetImage() {
  if (!originalImageData) return;
  currentImageData = new ImageData(new Uint8ClampedArray(originalImageData.data), originalImageData.width, originalImageData.height);
  ctx.putImageData(currentImageData, 0, 0);
  undoStack = [];
  document.getElementById('undoBtn').disabled = true;
  showToast('Image reset');
}

// ─── EXPORT ───────────────────────────────────────────────
function exportImage() {
  const link = document.createElement('a');
  link.download = 'liquify_output.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Image exported!');
}

// ─── TOAST ────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
